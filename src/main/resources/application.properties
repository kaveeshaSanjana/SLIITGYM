# ============================================================
#  IronPulse Gym Management System - Application Configuration
# ============================================================

# Application Name
spring.application.name=ironpulse-gym-system

# Server Port
server.port=8080

# ============================================================
#  DATABASE CONFIGURATION
#  Choose ONE of the sections below (H2 or MySQL)
# ============================================================

# ----- MySQL Database (Cloud - Google Cloud SQL) -----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ironpulse_gym?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Connection pool tuning
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate Configuration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson Configuration
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# ============================================================
#  EMAIL CONFIGURATION (Gmail SMTP)
#  Used to send notifications: welcome emails, payment receipts, etc.
# ============================================================
#
# SETUP INSTRUCTIONS:
#   1. Go to your Google Account -> Security -> 2-Step Verification (enable it)
#   2. Go to https://myaccount.google.com/apppasswords
#   3. Generate an App Password for "Mail"
#   4. Replace the values below with your Gmail and the generated app password
#
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Custom email properties
app.email.from-name=IronPulse Gym
app.email.enabled=false

# SMS Lenz Configuration
smslenz.user-id=${SMSLENZ_USER_ID:2030}
smslenz.api-key=${SMSLENZ_API_KEY:}
smslenz.sender-id=${SMSLENZ_SENDER_ID:SMSlenzDEMO}

# IoT Device API Key
app.device.api-key=${DEVICE_API_KEY:}

# AWS S3 Configuration
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}
